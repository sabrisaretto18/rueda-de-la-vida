<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Rueda de la Vida — Auditoría de 30 días</title>
<style>
  :root{
    --paper:#FAF7F1;
    --paper-dim:#F1ECE2;
    --ink:#1E2A22;
    --ink-soft:#5B6459;
    --line:#DCD5C6;
    --c1:#6E9B2E; /* Salud Física */
    --c2:#1E6FA8; /* Finanzas */
    --c3:#7B4B94; /* Desarrollo Personal */
    --c4:#E68A00; /* Propósito */
    --c5:#D9531E; /* Relaciones */
    --c6:#C22B6D; /* Organización */
    --c7:#0E8E82; /* Bienestar */
    --c8:#3B3E93; /* Vida y Experiencias */
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    min-height:100%;
  }
  .app{
    max-width:760px;
    margin:0 auto;
    padding:28px 20px 80px;
  }
  .masthead{
    text-align:center;
    margin-bottom:20px;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:600;
  }
  h1.title{
    font-family:Georgia,"Iowan Old Style","Palatino Linotype",serif;
    font-weight:600;
    font-size:32px;
    letter-spacing:-0.01em;
    margin:6px 0 0;
  }
  .subtitle{
    color:var(--ink-soft);
    font-size:14.5px;
    margin-top:6px;
    line-height:1.5;
  }

  /* progress rail */
  .rail{
    display:flex;
    gap:5px;
    margin:26px 0 30px;
  }
  .rail .seg{
    flex:1;
    height:6px;
    border-radius:4px;
    background:var(--line);
    position:relative;
    overflow:hidden;
    cursor:default;
  }
  .rail .seg.filled{background:var(--seg-color,var(--ink));}
  .rail .seg.current{outline:2px solid var(--ink); outline-offset:2px;}
  .rail .seg.clickable{cursor:pointer;}

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px;
  }
  @media (max-width:520px){ .card{padding:22px;} }

  .area-head{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .area-icon{
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--area-color);
    flex-shrink:0;
  }
  .area-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .area-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--area-color);font-weight:700;}
  h2.area-title{
    font-family:Georgia,serif;
    font-size:24px;
    margin:2px 0 0;
  }
  .lede{
    font-size:15.5px;
    line-height:1.65;
    color:var(--ink);
    margin:18px 0 22px;
  }
  .lede strong{font-weight:650;}

  .questions{
    list-style:none;
    padding:0;
    margin:0 0 22px;
    border-top:1px solid var(--line);
  }
  .questions li{
    padding:14px 0;
    border-bottom:1px solid var(--line);
  }
  .q-text{
    font-size:14.5px;
    line-height:1.5;
    display:flex;
    gap:10px;
    margin-bottom:10px;
  }
  .q-text::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--area-color);
    margin-top:7px;
    flex-shrink:0;
  }
  .q-scale{display:flex;gap:7px;padding-left:16px;}
  .q-pill{
    width:34px;height:34px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:#fff;
    font-family:inherit;
    font-size:13.5px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .12s ease;
  }
  .q-pill:hover{border-color:var(--area-color);}
  .q-pill.selected{
    background:var(--area-color);
    border-color:var(--area-color);
    color:#fff;
  }
  .q-scale-caption{
    display:flex;justify-content:space-between;
    padding-left:16px;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:5px;
    max-width:206px;
  }

  .suggested-box{
    display:flex;align-items:center;gap:12px;
    background:#fff;
    border:1.5px dashed var(--line);
    border-radius:10px;
    padding:14px 18px;
    margin-bottom:16px;
    font-size:13.5px;
    color:var(--ink-soft);
  }
  .suggested-box .sugg-value{
    font-family:Georgia,serif;
    font-size:22px;
    font-weight:700;
    color:var(--area-color);
    min-width:34px;
  }

  .rating-box{
    background:var(--paper-dim);
    border-radius:10px;
    padding:20px 20px 16px;
  }
  .rating-box label{
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    display:block;
    margin-bottom:10px;
    line-height:1.45;
  }
  .rating-row{display:flex;align-items:center;gap:16px;}
  input[type=range]{
    flex:1;
    -webkit-appearance:none;
    height:6px;
    border-radius:4px;
    background:linear-gradient(to right, var(--area-color) 0%, var(--area-color) var(--pct,50%), #E3DDCF var(--pct,50%), #E3DDCF 100%);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:22px;height:22px;border-radius:50%;
    background:#fff;border:3px solid var(--area-color);
    cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  input[type=range]::-moz-range-thumb{
    width:22px;height:22px;border-radius:50%;
    background:#fff;border:3px solid var(--area-color);
    cursor:pointer;
  }
  .rating-value{
    font-family:Georgia,serif;
    font-size:26px;
    min-width:38px;
    text-align:center;
    color:var(--area-color);
    font-weight:700;
  }

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:28px;
  }
  button{
    font-family:inherit;
    font-size:14.5px;
    font-weight:600;
    border-radius:8px;
    padding:12px 22px;
    cursor:pointer;
    border:1.5px solid var(--ink);
    background:var(--ink);
    color:#fff;
    transition:transform .08s ease, opacity .15s ease;
  }
  button:active{transform:scale(.97);}
  button.ghost{
    background:transparent;
    color:var(--ink);
    border-color:var(--line);
  }
  button.ghost:hover{border-color:var(--ink);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.wide{width:100%;}

  /* legend (numbered list matching the wheel badges) */
  .legend-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin:26px 0;
  }
  @media (max-width:560px){.legend-grid{grid-template-columns:1fr;}}
  .legend-item{
    display:flex;align-items:center;gap:10px;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    cursor:default;
  }
  .legend-item.clickable{cursor:pointer;}
  .legend-item.clickable:hover{background:var(--paper-dim);}
  .legend-num{
    width:22px;height:22px;border-radius:50%;
    background:var(--area-color);
    color:#fff;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .legend-name{flex:1;line-height:1.3;}
  .legend-score{font-family:Georgia,serif;font-weight:700;font-size:16px;color:var(--area-color);flex-shrink:0;}

  /* results */
  .wheel-wrap{display:flex;justify-content:center;margin:8px 0 20px;}
  .wheel-wrap svg{max-width:100%;height:auto;}
  .avg-line{
    text-align:center;
    margin:22px 0 4px;
    font-size:14px;
    color:var(--ink-soft);
  }
  .avg-line b{color:var(--ink);font-family:Georgia,serif;font-size:20px;}

  /* priority screen */
  .priority-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0;}
  @media (max-width:520px){.priority-grid{grid-template-columns:1fr;}}
  .priority-card{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    cursor:pointer;
    display:flex;align-items:center;gap:12px;
    transition:border-color .12s ease, background .12s ease;
  }
  .priority-card:hover{background:var(--paper-dim);}
  .priority-card.selected{border-color:var(--area-color);background:var(--paper-dim);}
  .priority-card .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--area-color);}
  .priority-card .pname{font-size:13.5px;font-weight:600;flex:1;}
  .priority-card .pscore{font-family:Georgia,serif;font-weight:700;color:var(--ink-soft);}

  /* actions screen */
  .action-list{list-style:none;padding:0;margin:20px 0;}
  .action-list li{
    display:flex;gap:12px;
    padding:13px 0;
    border-bottom:1px solid var(--line);
    font-size:14.5px;
    line-height:1.5;
  }
  .action-list li::before{
    content:"→";
    color:var(--area-color);
    font-weight:700;
    flex-shrink:0;
  }
  .restart-row{text-align:center;margin-top:34px;}
  .restart-row a{color:var(--ink-soft);font-size:13px;cursor:pointer;text-decoration:underline;}

  /* step animation */
  .step-anim{animation:fadeSlideIn .32s ease both;}
  @keyframes fadeSlideIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion:reduce){ .step-anim{animation:none;} }

  /* progress badge */
  .progress-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--paper-dim);
    border-radius:999px;
    padding:6px 14px;
    font-size:12px;font-weight:700;
    letter-spacing:.06em;
    color:var(--ink);
    margin-bottom:10px;
  }
  .progress-badge .badge-dot{width:8px;height:8px;border-radius:50%;background:var(--area-color);}

  /* continue banner */
  .continue-banner{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    background:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
    margin:0 0 22px;
    font-size:13.5px;
    flex-wrap:wrap;
  }
  .continue-banner .cb-text b{font-family:Georgia,serif;}
  .continue-banner .cb-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .continue-banner button{padding:9px 16px;font-size:13px;}

  /* notes */
  .notes-box{margin-top:14px;}
  .notes-box label{
    font-size:12.5px;font-weight:600;color:var(--ink-soft);
    display:block;margin-bottom:8px;
  }
  .notes-box textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    font-family:inherit;
    font-size:14px;
    color:var(--ink);
    resize:vertical;
    min-height:64px;
    background:var(--paper-dim);
  }
  .notes-box textarea:focus{outline:2px solid var(--area-color); outline-offset:1px;}

  /* connected-areas screen */
  .connected-flow{
    display:flex;flex-direction:column;gap:0;
    margin:22px 0;
    border-top:1px solid var(--line);
  }
  .connected-flow .cf-row{
    display:flex;align-items:center;gap:12px;
    padding:11px 0;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .connected-flow .cf-row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .connected-flow .cf-row .arrow{color:var(--ink-soft);}

  /* commit date */
  .commit-date{
    background:var(--paper-dim);
    border-radius:10px;
    padding:16px 18px;
    margin:22px 0 0;
    font-size:14px;
    text-align:center;
    line-height:1.6;
  }
  .commit-date b{font-family:Georgia,serif;font-size:16px;}

  .book-note{
    background:#fff;
    border:1.5px dashed var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin:14px 0 0;
    font-size:13.5px;
    line-height:1.6;
    color:var(--ink-soft);
    text-align:center;
  }
  .book-note b{color:var(--ink);}

  /* ranked accordion plan */
  .accordion-list{margin:22px 0;}
  .accordion-card{
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .accordion-header{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;
    cursor:pointer;
    background:#fff;
  }
  .accordion-header:hover{background:var(--paper-dim);}
  .rank-badge{
    width:24px;height:24px;border-radius:50%;
    background:var(--area-color);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;
    flex-shrink:0;
  }
  .acc-icon{
    width:30px;height:30px;border-radius:50%;
    background:var(--area-color);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .acc-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .acc-name{flex:1;font-size:14.5px;font-weight:600;}
  .acc-score{font-family:Georgia,serif;font-weight:700;color:var(--area-color);font-size:15px;}
  .acc-count{font-size:11.5px;color:var(--ink-soft);background:var(--paper-dim);border-radius:999px;padding:3px 8px;}
  .acc-chevron{display:flex;color:var(--ink-soft);flex-shrink:0;}
  .acc-chevron svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;}

  /* modal window */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(30,42,34,0.55);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    z-index:1000;
    animation:fadeIn .18s ease both;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{
    background:#fff;
    border-radius:16px;
    max-width:480px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:28px;
    position:relative;
    box-shadow:0 24px 60px rgba(0,0,0,.28);
    animation:fadeSlideIn .22s ease both;
  }
  .modal-close{
    position:absolute; top:16px; right:16px;
    width:32px;height:32px;border-radius:50%;
    border:1px solid var(--line);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .modal-close:hover{border-color:var(--area-color);}
  .modal-close svg{width:15px;height:15px;stroke:var(--ink);stroke-width:2;}
  .modal-header{display:flex;align-items:center;gap:14px;margin-bottom:2px;padding-right:34px;}

  /* checklist */
  .check-list{list-style:none;padding:0;margin:20px 0;}
  .check-list li{
    display:flex;gap:12px;align-items:flex-start;
    padding:13px 0;
    border-bottom:1px solid var(--line);
    font-size:14.5px;
    line-height:1.5;
    cursor:pointer;
  }
  .check-list li.done{color:var(--ink-soft);}
  .check-list li.done span.txt{text-decoration:line-through;}
  .check-box{
    width:19px;height:19px;border-radius:5px;
    border:1.5px solid var(--line);
    flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;
    background:#fff;
  }
  .check-list li.done .check-box{background:var(--area-color);border-color:var(--area-color);}
  .check-box svg{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none;display:none;}
  .check-list li.done .check-box svg{display:block;}
  .check-progress{
    text-align:center;font-size:13px;color:var(--ink-soft);margin-top:-6px;margin-bottom:6px;
  }

  /* export */
  .export-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
  .export-row button{padding:9px 16px;font-size:13px;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const STORAGE_KEY = "rueda-vida:progress";
const hasStorage = typeof window!=="undefined" && !!window.storage;

async function saveState(){
  if(!hasStorage) return;
  try{
    const payload = {
      ratings:state.ratings, touched:state.touched, notes:state.notes,
      answers:state.answers, sliderTouched:state.sliderTouched,
      checked:state.checked, expanded:state.expanded,
      areaIndex:state.areaIndex, step: (state.step==="intro"?"intro":state.step),
      lastSaved:new Date().toISOString(), reachedResults: state.reachedResults
    };
    await window.storage.set(STORAGE_KEY, JSON.stringify(payload), false);
  }catch(e){ /* storage unavailable, fail silently */ }
}

async function loadSavedProgress(){
  if(!hasStorage) return null;
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(!res || !res.value) return null;
    return JSON.parse(res.value);
  }catch(e){ return null; }
}

async function clearSavedProgress(){
  if(!hasStorage) return;
  try{ await window.storage.delete(STORAGE_KEY, false); }catch(e){}
}

  {

    icon:'<svg viewBox="0 0 24 24"><path d="M12 4v16M6 6.5C4 7.5 4 16.5 6 17.5c2 1 4.5-.5 6-1.5M18 6.5c2 1 2 10 0 11-2 1-4.5-.5-6-1.5"/></svg>',

function computeSuggested(i){
  const ans = state.answers[i];
  const answered = ans.filter(v=>v>0);
  if(answered.length===0) return null;
  const avg = answered.reduce((s,v)=>s+v,0)/answered.length;
  const ratio = avg/5;
  // Stricter, non-linear curve: mid-range answers are pulled down harder.
  // Only consistently strong answers (avg close to 5) reach the top of the scale.
  let sugg = Math.round(Math.pow(ratio, 1.5) * 10);
  if(sugg<1) sugg=1;
  if(sugg>10) sugg=10;
  return {value:sugg, count:answered.length};
}

function polar(cx,cy,r,angleDeg){
  const rad = (Math.PI/180)*angleDeg;
  return { x: cx + r*Math.sin(rad), y: cy - r*Math.cos(rad) };
}

function iconInner(svgStr){
  return svgStr.replace(/<svg[^>]*>/,'').replace('</svg>','');
}

function tangentRotation(theta){
  let r = theta;
  if(r>90 && r<270) r+=180;
  r = r%360;
  if(r>180) r-=360;
  if(r<-180) r+=360;
  return r;
}

function wrapLabel(text, maxChars){
  const words = text.split(" ");
  const lines = [];
  let cur = "";
  words.forEach(w=>{
    const test = cur ? cur+" "+w : w;
    if(test.length > maxChars && cur){ lines.push(cur); cur = w; }
    else { cur = test; }
  });
  if(cur) lines.push(cur);
  return lines;
}

let wheelUid = 0;

function lightenColor(hex, amt){
  const num = parseInt(hex.slice(1),16);
  let r=(num>>16)+amt, g=((num>>8)&0xff)+amt, b=(num&0xff)+amt;
  r=Math.min(255,Math.max(0,r)); g=Math.min(255,Math.max(0,g)); b=Math.min(255,Math.max(0,b));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function buildWheelSVG(ratings, opts){
  opts = opts || {};
  const size = opts.size || 500;
  const uid = "w"+(wheelUid++);
  const cx = size/2, cy = size/2;
  const maxR = size*0.28;
  const n = 8;
  let svg = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" font-family="Georgia, serif">`;

  svg += `<defs>
    <filter id="${uid}-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E2A22" flood-opacity="0.16"/>
    </filter>
    <filter id="${uid}-ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1E2A22" flood-opacity="0.10"/>
    </filter>
    <radialGradient id="${uid}-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1ECE2"/>
    </radialGradient>
    ${AREAS.map((a,i)=>`<linearGradient id="${uid}-grad${i}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${lightenColor(a.colorHex,34)}"/>
      <stop offset="100%" stop-color="${a.colorHex}"/>
    </linearGradient>`).join("")}
  </defs>`;

  // ambient shadow beneath the whole wheel
  svg += `<circle cx="${cx}" cy="${cy}" r="${maxR+34}" fill="#1E2A22" opacity="0.001" filter="url(#${uid}-ambient)"/>`;
  // soft backdrop disc
  svg += `<circle cx="${cx}" cy="${cy}" r="${maxR+6}" fill="url(#${uid}-bg)"/>`;

  // grid rings (1-10), every 5th ring slightly stronger
  for(let ring=1; ring<=10; ring++){
    const r = maxR*ring/10;
    let pts = "";
    for(let i=0;i<n;i++){
      const p = polar(cx,cy,r,i*45);
      pts += `${p.x},${p.y} `;
    }
    const strong = (ring%5===0);
    svg += `<polygon points="${pts}" fill="none" stroke="${strong?'#D9D1BE':'#EAE4D8'}" stroke-width="${strong?1.2:1}"/>`;
  }
  // axes + number ticks
  for(let i=0;i<n;i++){
    const p = polar(cx,cy,maxR,i*45);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#DDD6C7" stroke-width="1"/>`;
    if(!opts.hideTicks){
      for(let ring=2; ring<=10; ring+=2){
        const r = maxR*ring/10;
        const base = polar(cx,cy,r,i*45);
        const perp = polar(cx,cy, 8, i*45+90);
        const tx = base.x + (perp.x-cx), ty = base.y + (perp.y-cy);
        svg += `<text x="${tx}" y="${ty}" font-size="7" fill="#B3AB9C" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif">${ring}</text>`;
      }
    }
  }

  // outer color rim wedges, with visible gaps and a soft gradient per segment
  const rim0 = maxR+13, rim1 = maxR+39;
  svg += `<g filter="url(#${uid}-shadow)">`;
  for(let i=0;i<n;i++){
    const a0 = i*45-20.2, a1 = i*45+20.2;
    const p0 = polar(cx,cy,rim0,a0), p1 = polar(cx,cy,rim0,a1);
    const p2 = polar(cx,cy,rim1,a1), p3 = polar(cx,cy,rim1,a0);
    svg += `<path d="M${p0.x} ${p0.y} A${rim0} ${rim0} 0 0 1 ${p1.x} ${p1.y} L${p2.x} ${p2.y} A${rim1} ${rim1} 0 0 0 ${p3.x} ${p3.y} Z" fill="url(#${uid}-grad${i})"/>`;
  }
  svg += `</g>`;
  // thin ring separating rim from grid
  svg += `<circle cx="${cx}" cy="${cy}" r="${maxR}" fill="none" stroke="#fff" stroke-width="2.5"/>`;

  // data polygon
  if(!opts.hideData){
    let dataPts = "";
    const vertices = [];
    for(let i=0;i<n;i++){
      const val = ratings[i];
      const r = maxR*val/10;
      const p = polar(cx,cy,r,i*45);
      dataPts += `${p.x},${p.y} `;
      vertices.push(p);
    }
    svg += `<polygon points="${dataPts}" fill="#1E2A22" fill-opacity="0.12" stroke="#1E2A22" stroke-width="2.5" stroke-linejoin="round" filter="url(#${uid}-shadow)"/>`;
    vertices.forEach((p,i)=>{
      svg += `<circle cx="${p.x}" cy="${p.y}" r="6.5" fill="${AREAS[i].colorHex}" stroke="#fff" stroke-width="2.5"/>`;
    });
    const avg = (ratings.reduce((s,v)=>s+v,0)/ratings.length).toFixed(1);
    svg += `<g filter="url(#${uid}-shadow)">
      <circle cx="${cx}" cy="${cy}" r="24" fill="#fff" stroke="#1E2A22" stroke-width="1.5"/>
      <text x="${cx}" y="${cy-1}" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#1E2A22" font-family="Georgia, serif">${avg}</text>
      <text x="${cx}" y="${cy+13}" text-anchor="middle" dominant-baseline="central" font-size="6.5" fill="#8A8375" font-family="Arial, sans-serif" letter-spacing="0.5">PROMEDIO</text>
    </g>`;
  } else {
    svg += `<circle cx="${cx}" cy="${cy}" r="3" fill="#fff" stroke="#1E2A22" stroke-width="1.5"/>`;
  }

  // icon badges + number chips beyond the rim
  for(let i=0;i<n;i++){
    const a = AREAS[i];
    const theta = i*45;
    const iconPt = polar(cx,cy,rim1+24,theta);
    svg += `<g transform="translate(${iconPt.x},${iconPt.y})" filter="url(#${uid}-shadow)">
      <circle r="19" fill="${a.colorHex}"/>
      <circle r="19" fill="none" stroke="#fff" stroke-width="2.5"/>
      <g transform="translate(-11,-11) scale(0.92)" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconInner(a.icon)}</g>
    </g>
    <g transform="translate(${iconPt.x+13},${iconPt.y-13})">
      <circle r="10" fill="#fff" stroke="${a.colorHex}" stroke-width="1.5"/>
      <text text-anchor="middle" dominant-baseline="central" y="0.5" font-size="10.5" font-weight="700" fill="${a.colorHex}" font-family="Arial, sans-serif">${i+1}</text>
    </g>`;
  }

  svg += `</svg>`;
  return svg;
}

function render(){
  const app = document.getElementById("app");
  const modal = (state.modalArea!==null && state.modalArea!==undefined) ? modalHTML(state.modalArea) : "";
  app.innerHTML = `<div class="step-anim">${renderStep()}</div>${modal}`;
  attachHandlers();
  saveState();
}

function railHTML(){
  let segs = "";
  AREAS.forEach((a,i)=>{
    const done = state.touched[i];
    const isCurrent = state.step==="area" && state.areaIndex===i;
    segs += `<div class="seg ${done?'filled':''} ${isCurrent?'current':''} clickable" style="--seg-color:${a.colorHex}" data-jump="${i}" title="${a.name}"></div>`;
  });
  return `<div class="rail">${segs}</div>`;
}

function renderStep(){
  if(state.step==="intro") return introHTML();
  if(state.step==="area") return areaHTML(state.areaIndex);
  if(state.step==="results") return resultsHTML();
  if(state.step==="connected") return connectedHTML();
  if(state.step==="plan") return planHTML();
  return "";
}

function formatSavedDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleDateString("es-ES",{day:"numeric",month:"long"});
  }catch(e){ return ""; }
}

function legendHTML(opts){
  opts = opts || {};
  return AREAS.map((a,i)=>`
    <div class="legend-item ${opts.clickable?'clickable':''}" ${opts.clickable?`data-jump="${i}"`:""} style="--area-color:${a.colorHex}">
      <span class="legend-num">${i+1}</span>
      <span class="legend-name">${a.name}</span>
      ${opts.showScores?`<span class="legend-score">${state.ratings[i]}</span>`:""}
    </div>`).join("");
}

    </div>
    ${railHTML()}
    <div class="card" style="--area-color:${a.colorHex}">
      <div class="area-head">
        <div class="area-icon">${a.icon}</div>
        <div>
          <div class="area-eyebrow">Área ${i+1}</div>
          <h2 class="area-title">${a.name}</h2>
        </div>
      </div>
      <p class="lede">${a.lede}</p>
      <ul class="questions">${qs}</ul>
      ${suggestedBox}
      <div class="rating-box">
        <label>Esa es solo una guía. Más allá de la sugerencia, ¿qué calificación te pones tú mismo en esta área, del 1 al 10?</label>
        <div class="rating-row">
          <input type="range" min="1" max="10" step="1" value="${val}" id="slider" style="--pct:${pct}">
          <div class="rating-value" id="rating-value">${val}</div>
        </div>
        <div class="notes-box">
          <label>Notas (opcional): ¿por qué te diste esa calificación?</label>
          <textarea id="notes" placeholder="Escribe lo que quieras recordar sobre esta área...">${note}</textarea>
        </div>
      </div>
      <div class="nav-row">
        <button class="ghost" id="btn-back" ${i===0?"disabled":""}>Atrás</button>
        <button id="btn-next">${i===AREAS.length-1?"Ver mi rueda":"Siguiente área"}</button>
      </div>
    </div>`;
}

function resultsHTML(){
  const wheel = buildWheelSVG(state.ratings);
  const avg = (state.ratings.reduce((s,v)=>s+v,0)/state.ratings.length).toFixed(1);
  const legend = legendHTML({showScores:true, clickable:true});
  return `
    <div class="masthead">
      <div class="eyebrow">Tu resultado</div>
      <h1 class="title">Así luce tu rueda hoy</h1>
      <div class="subtitle">No te enfoques solo en la más alta o la más baja. Observa el equilibrio general.</div>
    </div>
    <div class="card">
      <div class="wheel-wrap" id="wheel-holder">${wheel}</div>
      <div class="export-row">
        <button class="ghost" id="btn-download-png">Descargar rueda (imagen)</button>
        <button class="ghost" id="btn-download-txt">Descargar resumen (texto)</button>
      </div>
      <div class="legend-grid">${legend}</div>
      <div class="avg-line">Promedio general: <b>${avg} / 10</b></div>
      <div class="nav-row" style="justify-content:center;">
        <button id="btn-to-connected">Continuar</button>
      </div>
    </div>`;
}

function connectedHTML(){
  const sorted = AREAS.map((a,i)=>({a,i,v:state.ratings[i]})).sort((x,y)=>y.v-x.v);
  const flowRows = sorted.map((s,idx)=>`
    <div class="cf-row">
      <span class="dot" style="background:${s.a.colorHex}"></span>
      <span style="flex:1;">${s.a.name}</span>
      <span style="font-family:Georgia,serif;font-weight:700;color:${s.a.colorHex}">${s.v}</span>
    </div>`).join("");
  return `
    <div class="masthead">
      <div class="eyebrow">Antes de continuar</div>
      <h1 class="title">Todas las áreas están conectadas</h1>
      <div class="subtitle">Aunque las evaluaste por separado, en la vida real ninguna funciona de forma aislada.</div>
    </div>
    <div class="card">
      <p class="lede">Cuando una sola área empieza a fallar, suele arrastrar a las demás: dejas de entrenar, baja tu energía, rinde menos en el trabajo y el estrés aumenta en cadena. Pero también sucede al revés — cuando fortaleces un área, las demás empiezan a mejorar contigo. Por eso esta auditoría no busca que persigas ocho dieces: busca el punto desde el cual puedes transformar todo el sistema.</p>
      <div class="connected-flow">${flowRows}</div>
      <div class="nav-row">
        <button class="ghost" id="btn-back-to-results">Volver a mi rueda</button>
        <button id="btn-to-plan">Ver mi plan de acción</button>
      </div>
    </div>`;
}

function planHTML(){
  const ranked = AREAS.map((a,i)=>({a,i,v:state.ratings[i]})).sort((x,y)=>x.v-y.v);
  const cards = ranked.map((r,rank)=>{
    const a = r.a;
    if(!state.checked[a.key]) state.checked[a.key] = a.actions.map(()=>false);
    const checks = state.checked[a.key];
    const doneCount = checks.filter(Boolean).length;
    return `
      <div class="accordion-card" style="--area-color:${a.colorHex}">
        <div class="accordion-header" data-open-modal="${r.i}">
          <span class="rank-badge">${rank+1}</span>
          <span class="acc-icon">${a.icon}</span>
          <span class="acc-name">${a.name}</span>
          <span class="acc-score">${r.v}/10</span>
          <span class="acc-count">${doneCount}/${checks.length}</span>
          <span class="acc-chevron">
            <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg>
          </span>
        </div>
      </div>`;
  }).join("");
  return `
    <div class="masthead">
      <div class="eyebrow">Tu plan de acción</div>
      <h1 class="title">Áreas para trabajar, en orden de prioridad</h1>
      <div class="subtitle">Empiezan por las calificaciones más bajas. Toca cada área para ver 10 acciones concretas que puedes aplicar.</div>
    </div>
    <div class="card">
      <div class="accordion-list">${cards}</div>
      <div class="commit-date">
        Elige las acciones que más se adapten a tu realidad actual: las que puedas aplicar a partir de hoy. No es una lista para completar entera, es un punto de partida.
      </div>
      <div class="book-note">
        📖 Si necesitas profundizar en el aprendizaje de cada una de estas áreas, recuerda los demás materiales de <b>"El Precio del Crecimiento"</b>, donde profundizamos y damos herramientas específicas para cada área, como Finanzas, Salud Física y Autoestima e Imagen Personal.
      </div>
      <div class="export-row">
        <button class="ghost" id="btn-download-txt2">Descargar mi resumen completo</button>
      </div>
      <div class="nav-row">
        <button class="ghost" id="btn-back-to-results2">Volver a mi rueda</button>
        <button id="btn-restart">Empezar de nuevo</button>
      </div>
    </div>`;
}

function modalHTML(i){
  const a = AREAS[i];
  if(!state.checked[a.key]) state.checked[a.key] = a.actions.map(()=>false);
  const checks = state.checked[a.key];
  const doneCount = checks.filter(Boolean).length;
  const items = a.actions.map((x,idx)=>`
    <li class="${checks[idx]?'done':''}" data-check="${i}:${idx}">
      <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4,13 9,18 20,6"/></svg></span>
      <span class="txt">${x}</span>
    </li>`).join("");
  return `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box" id="modal-box" style="--area-color:${a.colorHex}">
        <button class="modal-close" id="modal-close" aria-label="Cerrar">
          <svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
        </button>
        <div class="modal-header">
          <div class="area-icon">${a.icon}</div>
          <div>
            <div class="area-eyebrow">Calificación: ${state.ratings[i]}/10</div>
            <h2 class="area-title">${a.name}</h2>
          </div>
        </div>
        <p class="lede" style="margin:14px 0 0;font-size:14px;">10 acciones específicas que puedes realizar para mejorar esta área:</p>
        <div class="check-progress">${doneCount} de ${checks.length} acciones marcadas</div>
        <ul class="check-list">${items}</ul>
        <div class="commit-date" style="margin-top:4px;">
          Elige las que más se adapten a tu realidad actual: las que puedas aplicar a partir de hoy.
        </div>
      </div>
    </div>`;
}

function attachHandlers(){
  const app = document.getElementById("app");

  app.querySelectorAll("[data-jump]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.step="area";
      state.areaIndex=parseInt(el.getAttribute("data-jump"));
      render();
    });
  });

  const startBtn = document.getElementById("btn-start");
  if(startBtn) startBtn.addEventListener("click", ()=>{
    state = { step:"area", areaIndex:0, ratings:Array(8).fill(5), touched:Array(8).fill(false), notes:Array(8).fill(""), answers:Array(8).fill(null).map(()=>[0,0,0,0]), sliderTouched:Array(8).fill(false), expanded:{}, checked:{}, modalArea:null, reachedResults:false, savedBanner:null };
    clearSavedProgress();
    render();
  });

  const continueBtn = document.getElementById("btn-continue");
  if(continueBtn) continueBtn.addEventListener("click", async ()=>{
    const saved = await loadSavedProgress();
    if(saved){
      state.ratings = saved.ratings || state.ratings;
      state.touched = saved.touched || state.touched;
      state.notes = saved.notes || state.notes;
      state.answers = saved.answers || state.answers;
      state.sliderTouched = saved.sliderTouched || state.sliderTouched;
      state.checked = saved.checked || {};
      state.expanded = saved.expanded || {};
      state.reachedResults = !!saved.reachedResults;
      state.areaIndex = saved.areaIndex || 0;
      state.step = (saved.step && saved.step!=="intro") ? saved.step : "area";
    }
    state.savedBanner = null;
    render();
    window.scrollTo(0,0);
  });

  const discardBtn = document.getElementById("btn-discard");
  if(discardBtn) discardBtn.addEventListener("click", ()=>{
    state = { step:"intro", areaIndex:0, ratings:Array(8).fill(5), touched:Array(8).fill(false), notes:Array(8).fill(""), answers:Array(8).fill(null).map(()=>[0,0,0,0]), sliderTouched:Array(8).fill(false), expanded:{}, checked:{}, modalArea:null, reachedResults:false, savedBanner:null };
    clearSavedProgress();
    render();
  });

  const slider = document.getElementById("slider");
  if(slider){
    slider.addEventListener("input", (e)=>{
      const v = parseInt(e.target.value);
      state.ratings[state.areaIndex]=v;
      state.touched[state.areaIndex]=true;
      state.sliderTouched[state.areaIndex]=true;
      document.getElementById("rating-value").textContent=v;
      slider.style.setProperty("--pct",(v/10*100)+"%");
    });
    slider.addEventListener("change", ()=>{ saveState(); });
  }

  const notes = document.getElementById("notes");
  if(notes){
    notes.addEventListener("input", (e)=>{ state.notes[state.areaIndex]=e.target.value; });
    notes.addEventListener("blur", ()=>{ saveState(); });
  }

  app.querySelectorAll("[data-qanswer]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const [qi,val] = el.getAttribute("data-qanswer").split(":").map(Number);
      const i = state.areaIndex;
      state.answers[i][qi] = (state.answers[i][qi]===val) ? 0 : val;
      state.touched[i]=true;
      if(!state.sliderTouched[i]){
        const sugg = computeSuggested(i);
        if(sugg) state.ratings[i] = sugg.value;
      }
      render();
      saveState();
    });
  });

  const backBtn = document.getElementById("btn-back");
  if(backBtn) backBtn.addEventListener("click", ()=>{
    if(state.areaIndex>0){ state.areaIndex--; render(); }
  });

  const nextBtn = document.getElementById("btn-next");
  if(nextBtn) nextBtn.addEventListener("click", ()=>{
    state.touched[state.areaIndex]=true;
    if(state.areaIndex<AREAS.length-1){ state.areaIndex++; render(); }
    else { state.step="results"; state.reachedResults=true; render(); window.scrollTo(0,0); }
  });

  const toConnected = document.getElementById("btn-to-connected");
  if(toConnected) toConnected.addEventListener("click", ()=>{ state.step="connected"; render(); window.scrollTo(0,0); });

  const backToResults = document.getElementById("btn-back-to-results");
  if(backToResults) backToResults.addEventListener("click", ()=>{ state.step="results"; render(); window.scrollTo(0,0); });

  const backToResults2 = document.getElementById("btn-back-to-results2");
  if(backToResults2) backToResults2.addEventListener("click", ()=>{ state.step="results"; render(); window.scrollTo(0,0); });

  const toPlan = document.getElementById("btn-to-plan");
  if(toPlan) toPlan.addEventListener("click", ()=>{ state.step="plan"; render(); window.scrollTo(0,0); });

  app.querySelectorAll("[data-open-modal]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.modalArea = parseInt(el.getAttribute("data-open-modal"));
      render();
    });
  });

  const modalOverlay = document.getElementById("modal-overlay");
  if(modalOverlay){
    modalOverlay.addEventListener("click", (ev)=>{
      if(ev.target===modalOverlay){ state.modalArea=null; render(); }
    });
  }
  const modalClose = document.getElementById("modal-close");
  if(modalClose) modalClose.addEventListener("click", ()=>{ state.modalArea=null; render(); });

  app.querySelectorAll("[data-check]").forEach(el=>{
    el.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      const [areaIdx, actionIdx] = el.getAttribute("data-check").split(":").map(Number);
      const key = AREAS[areaIdx].key;
      state.checked[key][actionIdx] = !state.checked[key][actionIdx];
      render();
    });
  });

  const dlPng = document.getElementById("btn-download-png");
  if(dlPng) dlPng.addEventListener("click", downloadWheelPNG);

  const dlTxt = document.getElementById("btn-download-txt");
  if(dlTxt) dlTxt.addEventListener("click", downloadSummaryText);

  const dlTxt2 = document.getElementById("btn-download-txt2");
  if(dlTxt2) dlTxt2.addEventListener("click", downloadSummaryText);

  const restartBtn = document.getElementById("btn-restart");
  if(restartBtn) restartBtn.addEventListener("click", ()=>{
    state = { step:"intro", areaIndex:0, ratings:Array(8).fill(5), touched:Array(8).fill(false), notes:Array(8).fill(""), answers:Array(8).fill(null).map(()=>[0,0,0,0]), sliderTouched:Array(8).fill(false), expanded:{}, checked:{}, modalArea:null, reachedResults:false, savedBanner:null };
    clearSavedProgress();
    render();
    window.scrollTo(0,0);
  });
}

function downloadWheelPNG(){
  const holder = document.getElementById("wheel-holder");
  if(!holder) return;
  const svgEl = holder.querySelector("svg");
  if(!svgEl) return;
  const clone = svgEl.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const vb = clone.getAttribute("viewBox").split(" ").map(Number);
  const w = vb[2], h = vb[3];
  const scale = 2;
  const svgData = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = function(){
    const canvas = document.createElement("canvas");
    canvas.width = w*scale; canvas.height = h*scale;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#FAF7F1";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(blob){
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "mi-rueda-de-la-vida.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  };
  img.src = url;
}

function downloadSummaryText(){
  const lines = [];
  lines.push("LA RUEDA DE LA VIDA — Mi auditoría");
  lines.push("Fecha: "+new Date().toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"}));
  lines.push("");
  AREAS.forEach((a,i)=>{
    lines.push(`${i+1}. ${a.name}: ${state.ratings[i]}/10`);
    if(state.notes[i]) lines.push(`   Notas: ${state.notes[i]}`);
  });
  const avg = (state.ratings.reduce((s,v)=>s+v,0)/state.ratings.length).toFixed(1);
  lines.push("");
  lines.push(`Promedio general: ${avg}/10`);

  const ranked = AREAS.map((a,i)=>({a,i,v:state.ratings[i]})).sort((x,y)=>x.v-y.v);
  lines.push("");
  lines.push("Plan de acción, en orden de prioridad:");
  ranked.forEach((r,rank)=>{
    lines.push(`${rank+1}. ${r.a.name} (${r.v}/10)`);
    const checks = state.checked[r.a.key];
    if(checks){
      r.a.actions.forEach((act,idx)=>{
        lines.push(`   [${checks[idx]?"x":" "}] ${act}`);
      });
    }
  });
  lines.push("");
  lines.push("Elige las acciones que más se adapten a tu realidad actual: las que puedas aplicar a partir de hoy.");

  const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mi-rueda-de-la-vida.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function init(){
  const saved = await loadSavedProgress();
  if(saved && saved.lastSaved){
    state.savedBanner = {lastSaved:saved.lastSaved};
  }
  render();
}

document.addEventListener("keydown", (e)=>{
  if(e.key==="Escape" && state.modalArea!==null){
    state.modalArea = null;
    render();
  }
});

init();
</script>
</body>
</html>
